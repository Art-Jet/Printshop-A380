<model-viewer
  id="viewer"
  src="./A380.glb"
  ios-src="./A380.usdz"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  scale="0.05 0.05 0.05"
  style="width:100vw; height:100vh;">
</model-viewer>

<button id="ar-btn">AR starten</button>

<script>
  const btn = document.getElementById("ar-btn");
  const viewer = document.getElementById("viewer");

  btn.addEventListener("click", () => {
    viewer.activateAR();
  });
</script>

<style>
  #ar-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 20px;
    font-size: 16px;
    background: black;
    color: white;
    border-radius: 10px;
    border: none;
  }
</style>
