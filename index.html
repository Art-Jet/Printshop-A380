<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Model Viewer</title>

  <!-- Model Viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #ffffff;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    #ar-button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 18px;
      font-size: 16px;
      background: black;
      color: white;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

  <model-viewer
    src="./A380.glb"
    ios-src="./A380.usdz"
    alt="A380 Model"

    ar
    ar-modes="scene-viewer webxr quick-look"

    camera-controls
    auto-rotate

    <!-- 🔥 WICHTIG: AR Zoom Fix -->
    scale="0.2 0.2 0.2"

    <!-- Nur für normalen Viewer (nicht AR auf iPhone) -->
    camera-orbit="0deg 75deg 120%"

    shadow-intensity="1">

    <button slot="ar-button" id="ar-button">
      AR starten
    </button>

  </model-viewer>

</body>
</html>
