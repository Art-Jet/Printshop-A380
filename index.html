<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    #ar-button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 20px;
      font-size: 16px;
      background: black;
      color: white;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

<model-viewer
  id="viewer"
  src="./A380.glb"
  ios-src="./A380.usdz"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  scale="0.05 0.05 0.05">
</model-viewer>

<!-- ✅ Eigener AR Button -->
<button id="ar-button" onclick="document.getElementById('viewer').activateAR()">
  AR starten
</button>

</body>
</html>
