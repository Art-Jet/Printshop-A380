<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbus A380 AR</title>

  <!-- model-viewer Bibliothek von Google -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    model-viewer {
      width: 80%;
      max-width: 600px;
      height: 80vh;
    }
  </style>
</head>
<body>

<model-viewer
    src="A380.glb"
    ios-src="A380.usdz"
    alt="Airbus A380 3D Modell"
    ar
    ar-modes="webxr quick-look"
    camera-controls
    auto-rotate
    background-color="#ffffff">
</model-viewer>

</body>
</html>
